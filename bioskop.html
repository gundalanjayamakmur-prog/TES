<!-- JUMLAH ORANG -->
<div class="box">
  <label>Jumlah Penonton:</label>
  <input type="number" id="jumlah" min="1" value="1">
</div>

<!-- HARGA -->
<div class="box">
  <p>Harga Tiket: <b>Rp 15.000 / orang</b></p>
  <p>Total: <span id="total">Rp 15.000</span></p>
</div>

<!-- METODE PEMBAYARAN -->
<div class="box">
  <label>Pilih Pembayaran:</label>
  <select id="pembayaran">
    <option value="">-- Pilih --</option>
    <option value="ewallet">E-Wallet</option>
    <option value="bank">Transfer Bank</option>
    <option value="qris">QRIS</option>
    <option value="cash">Cash</option>
  </select>
</div>

<!-- DETAIL PEMBAYARAN -->
<div id="detailPembayaran" class="box"></div>

<!-- UPLOAD BUKTI -->
<div class="box">
  <label>Upload Bukti Pembayaran (opsional):</label>
  <input type="file" id="bukti">
</div>

<!-- BUTTON -->
<button onclick="booking()">Booking Sekarang</button>

<script src="bioskop.js"></script>
</body>
</html>
